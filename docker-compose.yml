services:
  nginx:
    container_name: vpn_nginx
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "8443:443"
    networks:
      - vpn_network
    restart: always
    environment:
      DOMAIN: ${DOMAIN}
      LOCATION: ${SERVER_URL}
      CERT_FULLCHAIN_PATH: "/etc/nginx/certs/fullchain.pem"
      CERT_KEY_PATH: "/etc/nginx/certs/privkey.pem"
    volumes:
      - ./etc/nginx/templates:/etc/nginx/templates:ro
      - ./etc/nginx/conf:/etc/nginx/conf.d
      - ./etc/nginx/static:/usr/share/nginx/html:ro
      - ${CERT_FULLCHAIN_PATH}:/etc/nginx/certs/fullchain.pem
      - ${CERT_KEY_PATH}:/etc/nginx/certs/privkey.pem
      - ./certbot/data:/var/www/certbot
    depends_on:
      - vpn_site
      - marzban
      - vpn_bot

  postgres:
    container_name: vpn_postgres
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - vpn_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  vpn_site:
    image: vpn_bot
    container_name: vpn_site
    command: uvicorn webapp.main:app --host 0.0.0.0 --port 8000
    restart: always
    env_file:
      - ".env"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      marzban:
        condition: service_started
    networks:
      - vpn_network

  marzban:
    image: gozargah/marzban:v0.8.4
    container_name: vpn_marzban
    restart: always
    dns:
      - 1.1.1.1
      - 1.0.0.1
    env_file: .env.marzban
    environment:
      UVICORN_HOST: "0.0.0.0"
      UVICORN_PORT: "8002"
      YOUR_DOMAIN: ${DOMAIN}
    ports:
      - "127.0.0.1:8002:8002"
      - "443:443"
    networks:
      - vpn_network
    volumes:
      - marz-storage:/code
      - ./volumes/marzban:/var/lib/marzban
      - ./certbot/data:/var/www/certbot
      - /etc/timezone:/etc/timezone:ro
      - ${CERT_FULLCHAIN_PATH}:/etc/marzban/certs/fullchain.pem
      - ${CERT_KEY_PATH}:/etc/marzban/certs/privkey.pem
      - ${CERT_FULLCHAIN_PATH}:${CERT_FULLCHAIN_PATH}
      - ${CERT_KEY_PATH}:${CERT_KEY_PATH}
    logging:
      driver: "json-file"
      options:
        max-size: "900k"
        max-file: "10"

  vpn_bot:
    image: vpn_bot
    container_name: vpn_bot
    stop_signal: SIGINT
    build:
      context: .
    working_dir: "/usr/src/app"
    volumes:
      - .:/usr/src/app
    command: python3 -m bot
    restart: always
    ports:
      - "8081:8081"
    env_file:
      - ".env"
    networks:
      - vpn_network
    depends_on:
      postgres:
        condition: service_healthy
      marzban:
        condition: service_started

networks:
  vpn_network:
    driver: bridge

volumes:
  marz-storage:
    driver: local
  postgres-data:
    driver: local
