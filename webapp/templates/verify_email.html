{% extends "base.html" %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 85vh;">
    <div class="col-12 col-md-5 col-lg-4">

        <div class="card glass-card p-4 animate-in">
            <div class="card-body">
                <div class="text-center mb-3">
                    <div class="feature-icon mx-auto mb-3">
                        <i class="fas fa-envelope-open-text"></i>
                    </div>
                    <h3 class="fw-bold mb-1">Подтверждение Email</h3>
                    <p class="text-gray small mb-0">Код отправлен на <span class="text-orange fw-bold">{{ email }}</span></p>
                </div>

                {% if message %}
                    <div class="alert-custom alert-success">{{ message }}</div>
                {% endif %}

                {% if error %}
                    <div class="alert-custom alert-error">{{ error }}</div>
                {% endif %}

                <form action="/verify-email" method="post">
                    <input type="hidden" name="registration_token" value="{{ registration_token }}">

                    <div class="mb-4">
                        <label class="form-label">Код из письма</label>
                        <input type="text" name="code" class="form-control text-center text-orange fw-bold fs-5"
                               placeholder="000000" maxlength="6" required autocomplete="one-time-code"
                               style="letter-spacing: 8px;">
                    </div>

                    <button type="submit" class="btn btn-orange w-100 py-2 fw-bold">
                        <span class="btn-text">Подтвердить</span>
                    </button>
                </form>

                <form action="/resend-code" method="post" class="mt-3 text-center">
                    <input type="hidden" name="registration_token" value="{{ registration_token }}">
                    <button type="submit" class="btn btn-link text-gray text-decoration-none hover-effect small p-0">
                        <i class="fas fa-redo me-1"></i> Отправить код повторно
                    </button>
                </form>

                <div class="mt-3 text-center">
                    <a href="/register" class="text-muted text-decoration-none hover-effect small">
                        <i class="fas fa-arrow-left me-1"></i> Назад к регистрации
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
