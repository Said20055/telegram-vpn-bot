{% extends "base.html" %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 85vh;">
    <div class="col-12 col-md-5 col-lg-4">

        <div class="card glass-card p-4 animate-in">
            <div class="card-body">
                <div class="text-center mb-3">
                    <div class="feature-icon mx-auto mb-3">
                        <i class="fas fa-lock-open"></i>
                    </div>
                    <h3 class="fw-bold mb-0">Новый пароль</h3>
                </div>

                {% if message %}
                    <div class="alert-custom alert-success">{{ message }}</div>
                {% endif %}

                {% if error %}
                    <div class="alert-custom alert-error">{{ error }}</div>
                {% endif %}

                <form action="/reset-password" method="post">
                    <input type="hidden" name="email" value="{{ email }}">

                    <div class="mb-3">
                        <label class="form-label">Код из письма</label>
                        <input type="text" name="code" class="form-control text-center text-orange fw-bold fs-5"
                               placeholder="000000" maxlength="6" required
                               style="letter-spacing: 8px;">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Новый пароль</label>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" name="new_password" class="form-control" placeholder="Минимум 6 символов" required minlength="6">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-orange w-100 py-2 fw-bold">
                        <span class="btn-text">Изменить пароль</span>
                    </button>
                </form>

                <div class="mt-4 text-center">
                    <a href="/login" class="text-gray text-decoration-none hover-effect small">
                        <i class="fas fa-arrow-left me-1"></i> Отмена
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
