{% extends "base.html" %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 85vh;">
    <div class="col-12 col-md-5 col-lg-4">

        <div class="card glass-card p-4 animate-in">
            <div class="card-body">
                <div class="text-center mb-4">
                    <div class="feature-icon mx-auto mb-3">
                        <i class="fas fa-key"></i>
                    </div>
                    <h3 class="fw-bold mb-1">Сброс пароля</h3>
                    <p class="text-gray small mb-0">Введите Email, и мы пришлём код подтверждения</p>
                </div>

                {% if error %}
                    <div class="alert-custom alert-error">{{ error }}</div>
                {% endif %}

                <form action="/forgot-password" method="post" id="resetForm">
                    <div class="mb-4">
                        <label class="form-label">Email</label>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-orange w-100 py-2 fw-bold">
                        <span class="btn-text">Отправить код</span>
                    </button>
                </form>

                <div class="mt-4 text-center">
                    <a href="/login" class="text-gray text-decoration-none hover-effect small">
                        <i class="fas fa-arrow-left me-1"></i> Назад ко входу
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
